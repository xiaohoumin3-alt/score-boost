<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户反馈收集 - 日日守护</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-weight: bold;
            color: #333;
            margin-bottom: 8px;
        }
        input[type="text"],
        input[type="number"],
        textarea,
        select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            font-family: inherit;
        }
        input:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
        }
        textarea {
            resize: vertical;
            min-height: 100px;
        }
        .rating {
            display: flex;
            gap: 10px;
            margin-top: 8px;
        }
        .rating-btn {
            width: 50px;
            height: 50px;
            border: 2px solid #e0e0e0;
            border-radius: 50%;
            background: white;
            cursor: pointer;
            font-size: 20px;
            transition: all 0.3s;
        }
        .rating-btn:hover, .rating-btn.selected {
            border-color: #667eea;
            background: #f0f3ff;
            transform: scale(1.1);
        }
        .submit-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }
        .success-msg {
            display: none;
            text-align: center;
            padding: 30px;
        }
        .success-msg .icon {
            font-size: 64px;
            margin-bottom: 15px;
        }
        .quick-options {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
        }
        .quick-option {
            padding: 8px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 20px;
            background: white;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s;
        }
        .quick-option:hover, .quick-option.selected {
            border-color: #667eea;
            background: #f0f3ff;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="feedbackForm">
            <h1>📝 用户反馈</h1>
            <p class="subtitle">您的反馈帮助我们做得更好！</p>

            <form id="form" onsubmit="handleSubmit(event)">
                <div class="form-group">
                    <label>孩子使用前的分数 *</label>
                    <input type="number" id="beforeScore" placeholder="例如：65" required min="0" max="100">
                </div>

                <div class="form-group">
                    <label>使用后的分数（如有）</label>
                    <input type="number" id="afterScore" placeholder="例如：88" min="0" max="100">
                </div>

                <div class="form-group">
                    <label>使用天数</label>
                    <input type="number" id="daysUsed" placeholder="例如：30" min="0">
                </div>

                <div class="form-group">
                    <label>整体评分 *</label>
                    <div class="rating" id="rating">
                        <button type="button" class="rating-btn" data-rating="1">😞</button>
                        <button type="button" class="rating-btn" data-rating="2">😕</button>
                        <button type="button" class="rating-btn" data-rating="3">😐</button>
                        <button type="button" class="rating-btn" data-rating="4">🙂</button>
                        <button type="button" class="rating-btn" data-rating="5">😄</button>
                    </div>
                    <input type="hidden" id="ratingValue" required>
                </div>

                <div class="form-group">
                    <label>最喜欢的功能（可多选）</label>
                    <div class="quick-options" id="features">
                        <span class="quick-option" data-value="AI出题">🤖 AI出题</span>
                        <span class="quick-option" data-value="自适应难度">📊 自适应难度</span>
                        <span class="quick-option" data-value="智能提示">💡 智能提示</span>
                        <span class="quick-option" data-value="Memory系统">🧠 Memory系统</span>
                        <span class="quick-option" data-value="每日任务">📅 每日任务</span>
                    </div>
                    <input type="hidden" id="selectedFeatures">
                </div>

                <div class="form-group">
                    <label>建议或问题</label>
                    <textarea id="feedback" placeholder="有什么建议或遇到什么问题？请告诉我们..."></textarea>
                </div>

                <div class="form-group">
                    <label>联系方式（可选，用于回复）</label>
                    <input type="text" id="contact" placeholder="微信号或手机号">
                </div>

                <button type="submit" class="submit-btn">提交反馈</button>
            </form>
        </div>

        <div id="successMsg" class="success-msg">
            <div class="icon">✅</div>
            <h2>感谢您的反馈！</h2>
            <p style="margin-top: 15px; color: #666;">我们会认真阅读每一条反馈，持续改进产品。</p>
            <p style="margin-top: 10px; color: #999; font-size: 14px;">您可以关闭此页面了</p>
        </div>
    </div>

    <script>
        // 评分选择
        document.querySelectorAll('.rating-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.rating-btn').forEach(b => b.classList.remove('selected'));
                this.classList.add('selected');
                document.getElementById('ratingValue').value = this.dataset.rating;
            });
        });

        // 功能选择
        const selectedFeatures = [];
        document.querySelectorAll('.quick-option').forEach(option => {
            option.addEventListener('click', function() {
                this.classList.toggle('selected');
                const value = this.dataset.value;
                if (this.classList.contains('selected')) {
                    selectedFeatures.push(value);
                } else {
                    const index = selectedFeatures.indexOf(value);
                    if (index > -1) selectedFeatures.splice(index, 1);
                }
                document.getElementById('selectedFeatures').value = selectedFeatures.join(',');
            });
        });

        // 表单提交
        function handleSubmit(e) {
            e.preventDefault();

            const rating = document.getElementById('ratingValue').value;
            if (!rating) {
                alert('请选择评分');
                return;
            }

            const feedback = {
                beforeScore: document.getElementById('beforeScore').value,
                afterScore: document.getElementById('afterScore').value,
                daysUsed: document.getElementById('daysUsed').value,
                rating: rating,
                features: document.getElementById('selectedFeatures').value,
                feedback: document.getElementById('feedback').value,
                contact: document.getElementById('contact').value,
                timestamp: new Date().toISOString(),
                userAgent: navigator.userAgent
            };

            // 保存到本地存储（实际项目中应该发送到服务器）
            saveFeedback(feedback);

            // 显示成功消息
            document.getElementById('feedbackForm').style.display = 'none';
            document.getElementById('successMsg').style.display = 'block';
        }

        function saveFeedback(feedback) {
            // 获取现有反馈
            const feedbacks = JSON.parse(localStorage.getItem('feedbacks') || '[]');
            feedbacks.push(feedback);
            localStorage.setItem('feedbacks', JSON.stringify(feedbacks));

            // 在实际项目中，这里应该发送到服务器
            // 例如：fetch('/api/feedback', { method: 'POST', body: JSON.stringify(feedback) })

            console.log('Feedback saved:', feedback);
        }

        // 页面加载时检查是否有未发送的反馈
        window.addEventListener('load', function() {
            const feedbacks = JSON.parse(localStorage.getItem('feedbacks') || '[]');
            console.log('Total feedbacks collected:', feedbacks.length);
        });
    </script>
</body>
</html>
